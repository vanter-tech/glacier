version: "2"

run:
  timeout: 5m

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - gocyclo
    - funlen
    - gocritic
    - revive

  settings:
    errcheck:
      check-type-assertions: true
      check-blank: true
    gocyclo:
      min-complexity: 15
    funlen:
      lines: 50
      statements: 30
    gocritic:
      enabled-tags:
        - diagnostic
        - style
        - performance

  exclusions:
    paths:
      - polar/node_modules
      - iceberg/database/queries