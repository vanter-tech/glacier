<div class="flex flex-col gap-4 p-4 text-smoky dark:text-gh-text">
  <div class="border-b border-smoky/10 dark:border-gh-border pb-4">
    <p class="text-sm text-smoky/70 dark:text-gh-muted uppercase tracking-wider">Amount</p>
    <p class="text-4xl font-bold text-sunglow dark:text-gh-accent">${{ receipt().amount }}</p>
  </div>
  <div class="grid grid-cols-2 gap-4">
    <div>
      <p class="text-sm text-smoky/70 dark:text-gh-muted">Date</p>
      <p class="font-medium">{{ receipt().date }}</p>
    </div>
    <div>
      <p class="text-sm text-smoky/70 dark:text-gh-muted">Transaction ID</p>
      <p class="font-medium font-mono text-sm">#{{ receipt().id }}</p>
    </div>
  </div>
  <div class="pt-4 border-t border-smoky/10 dark:border-gh-border">
    <p class="text-sm text-smoky/70 dark:text-gh-muted mb-2">Description</p>

    @if (receipt().description.Valid) {
      <div class="bg-smoky/5 dark:bg-gh-bg p-4 rounded-lg">
        <p class="whitespace-pre-wrap">{{ receipt().description.String }}</p>
      </div>
    } @else {
      <p class="italic text-smoky/50 dark:text-gh-muted/50">No description provided.</p>
    }

  </div>
</div>
