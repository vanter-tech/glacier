<form [formGroup]="receiptForm" (ngSubmit)="submit()" class="flex flex-col gap-4">

  <div>
    <label class="block text-sm font-medium text-smoky dark:text-gh-text mb-1">{{ 'PERSONAL.AMOUNT' | translate }}</label>
    <input type="number" formControlName="amount" class="w-full px-3 py-2 border border-smoky/20 rounded-md bg-transparent dark:border-gh-border dark:text-gh-text outline-none focus:border-sunglow dark:focus:border-gh-accent">
  </div>

  <div>
    <label class="block text-sm font-medium text-smoky dark:text-gh-text mb-1">{{ 'PERSONAL.DATE' | translate }}</label>
    <input type="date" formControlName="date" class="w-full px-3 py-2 border border-smoky/20 rounded-md bg-transparent dark:border-gh-border dark:text-gh-text dark:[color-scheme:dark] outline-none focus:border-sunglow dark:focus:border-gh-accent">
  </div>

  <div>
    <label class="block text-sm font-medium text-smoky dark:text-gh-text mb-1">{{ 'PERSONAL.DESCRIPTION' | translate }}</label>
    <input type="text" formControlName="description" class="w-full px-3 py-2 border border-smoky/20 rounded-md bg-transparent dark:border-gh-border dark:text-gh-text outline-none focus:border-sunglow dark:focus:border-gh-accent">
  </div>

  <div class="mt-4 flex justify-end gap-3">
    <button type="button" (click)="cancel()" class="px-4 py-2 rounded-md border border-smoky/20 dark:border-gh-border text-smoky dark:text-gh-text hover:bg-smoky/5 dark:hover:bg-gh-surface transition-colors font-medium">
      {{ 'PERSONAL.CANCEL' | translate }}
    </button>
    <button type="submit" [disabled]="!receiptForm.valid" class="px-4 py-2 rounded-md bg-sunglow dark:bg-gh-accent text-smoky dark:text-gh-bg font-bold hover:bg-sunglow/80 dark:hover:bg-gh-accent/80 transition-colors shadow-sm disabled:opacity-50 disabled:cursor-not-allowed">
      {{ 'PERSONAL.SAVE_RECEIPT' | translate }}
    </button>
  </div>

</form>
