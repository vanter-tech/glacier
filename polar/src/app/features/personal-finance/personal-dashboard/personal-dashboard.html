<div class="relative flex h-screen w-full bg-isabelline text-smoky overflow-hidden">

  <div class="group absolute left-0 top-0 h-full w-1/12 hover:w-64 z-50">

    <aside
      class="h-full w-64 bg-isabelline border-r border-smoky/10 flex flex-col shadow-2xl -translate-x-full group-hover:translate-x-0 transition-transform duration-300 ease-in-out">

      <div class="p-6 font-bold text-xl tracking-tight whitespace-nowrap">
        Glacier
      </div>

      <nav class="flex flex-col gap-2 px-4 mt-4 whitespace-nowrap">

        <button
          (click)="switchTab('summary')"
          [class.bg-sunglow]="activeTab === 'summary'"
          [class.text-smoky]="activeTab === 'summary'"
          class="text-left px-4 py-2 rounded-md hover:bg-sunglow/50 transition-colors">
          {{ 'PERSONAL.TAB_SUMMARY' | translate }}
        </button>

        <button
          (click)="switchTab('receipts')"
          [class.bg-sunglow]="activeTab === 'receipts'"
          [class.text-smoky]="activeTab === 'receipts'"
          class="text-left px-4 py-2 rounded-md hover:bg-sunglow/50 transition-colors">
          {{ 'PERSONAL.TAB_RECEIPTS' | translate }}
        </button>

        <button
          (click)="switchTab('due-payments')"
          [class.bg-sunglow]="activeTab === 'due-payments'"
          [class.text-smoky]="activeTab === 'due-payments'"
          class="text-left px-4 py-2 rounded-md hover:bg-sunglow/50 transition-colors">
          {{ 'PERSONAL.TAB_DUE_PAYMENTS' | translate }}
        </button>

        <button
          (click)="switchTab('cash-flow')"
          [class.bg-sunglow]="activeTab === 'cash-flow'"
          [class.text-smoky]="activeTab === 'cash-flow'"
          class="text-left px-4 py-2 rounded-md hover:bg-sunglow/50 transition-colors">
          {{ 'PERSONAL.TAB_CASH_FLOW' | translate }}
        </button>
      </nav>
    </aside>
  </div>

  <main class="flex-1 flex flex-col w-full h-full">

    <header class="h-16 border-b border-smoky/10 flex items-center justify-between px-8">

      <h2 class="text-lg font-semibold capitalize">{{ activeTab.replace('-', ' ') }}</h2>

      <div class="flex items-center gap-2">
        <input type="date"
               class="bg-transparent border border-smoky/20 rounded px-2 py-1 text-sm outline-none focus:border-sunglow">
        <span>-</span>
        <input type="date"
               class="bg-transparent border border-smoky/20 rounded px-2 py-1 text-sm outline-none focus:border-sunglow">
      </div>
    </header>

    <div class="flex-1 p-8 overflow-y-auto">
      @if (activeTab === 'summary') {
        <app-summary></app-summary>
      }
      @if (activeTab === 'receipts') {
        <app-receipts></app-receipts>
      }
      @if (activeTab === 'due-payments') {
        <app-due-payments></app-due-payments>
      }
      @if (activeTab === 'cash-flow') {
        <app-cash-flow></app-cash-flow>
      }
    </div>
  </main>
</div>
