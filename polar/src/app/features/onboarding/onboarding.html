<div class="min-h-screen bg-isabelline dark:bg-gh-bg flex flex-col items-center justify-center p-6 transition-colors duration-300">

  <div class="text-center mb-12">
    <h1 class="text-5xl font-extrabold text-smoky dark:text-gh-text tracking-tight transition-colors">{{ 'ONBOARDING.TITLE' | translate }}</h1>

    <p class="text-lg text-smoky dark:text-gh-muted opacity-70 dark:opacity-100 mt-2 transition-colors">{{ 'ONBOARDING.SUBTITLE' | translate }}</p>
  </div>

  <div class="flex flex-col md:flex-row gap-8 max-w-4xl w-full justify-center">

    <button (click)="chooseProfile(ProfileType.PERSONAL)"
            class="group relative flex-1 bg-white dark:bg-gh-surface p-8 rounded-2xl shadow-xl hover:shadow-2xl transition-all duration-300 hover:-translate-y-2 text-left border-2 border-transparent dark:border-gh-border hover:border-sunglow dark:hover:border-gh-accent text-smoky dark:text-gh-text">

      <div class="w-12 h-12 rounded-full bg-sunglow dark:bg-gh-accent/20 dark:border dark:border-gh-accent/50 flex items-center justify-center mb-6 shadow-sm transition-colors"></div>

      <h2 class="text-2xl font-bold mb-3">{{ 'ONBOARDING.PERSONAL_TITLE' | translate }}</h2>

      <p class="opacity-80 dark:opacity-100 dark:text-gh-muted leading-relaxed transition-colors">{{ 'ONBOARDING.PERSONAL_DESC' | translate }}</p>
    </button>

    <button (click)="chooseProfile(ProfileType.STORE)" class="group relative flex-1 bg-white dark:bg-gh-surface p-8 rounded-2xl shadow-xl hover:shadow-2xl transition-all duration-300 hover:-translate-y-2 text-left border-2 border-transparent dark:border-gh-border hover:border-sunglow dark:hover:border-gh-accent text-smoky dark:text-gh-text">

      <div class="w-12 h-12 rounded-full bg-sunglow dark:bg-gh-accent/20 dark:border dark:border-gh-accent/50 flex items-center justify-center mb-6 shadow-sm transition-colors"></div>

      <h2 class="text-2xl font-bold mb-3">{{ 'ONBOARDING.STORE_TITLE' | translate }}</h2>

      <p class="opacity-80 dark:opacity-100 dark:text-gh-muted leading-relaxed transition-colors">{{ 'ONBOARDING.STORE_DESC' | translate }}</p>
    </button>
  </div>
</div>
