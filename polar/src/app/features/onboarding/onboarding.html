<div class="min-h-screen bg-isabelline flex flex-col items-center justify-center p-6">
  <div class="text-center mb-12">
    <h1 class="text-5xl font-extrabold text-smoky tracking-tight">{{ 'ONBOARDING.TITLE' | translate }}</h1>
    <p class="text-lg text-smoky opacity-70 mt-2">{{ 'ONBOARDING.SUBTITLE' | translate }}</p>
  </div>

  <div class="flex flex-col md:flex-row gap-8 max-w-4xl w-full justify-center">
    <button (click)="chooseProfile('personal')"
            class="group relative flex-1 bg-white p-8 rounded-2xl shadow-xl hover:shadow-2xl transition-all duration-300 hover:-translate-y-2 text-left border-2 border-transparent hover:border-sunglow text-smoky">
      <div class="w-12 h-12 rounded-full bg-sunglow flex items-center justify-center mb-6 shadow-sm"></div>
      <h2 class="text-2xl font-bold mb-3">{{ 'ONBOARDING.PERSONAL_TITLE' | translate }}</h2>
      <p class="opacity-80 leading-relaxed">{{ 'ONBOARDING.PERSONAL_DESC' | translate }}</p>
    </button>

    <button (click)="chooseProfile('store')"
            class="group relative flex-1 bg-white p-8 rounded-2xl shadow-xl hover:shadow-2xl transition-all duration-300 hover:-translate-y-2 text-left border-2 border-transparent hover:border-sunglow text-smoky">
      <div class="w-12 h-12 rounded-full bg-sunglow flex items-center justify-center mb-6 shadow-sm"></div>
      <h2 class="text-2xl font-bold mb-3">{{ 'ONBOARDING.STORE_TITLE' | translate }}</h2>
      <p class="opacity-80 leading-relaxed">{{ 'ONBOARDING.STORE_DESC' | translate }}</p>
    </button>
  </div>
</div>
