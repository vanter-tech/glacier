<div class="relative flex h-screen w-full bg-isabelline text-smoky dark:bg-gh-bg dark:text-gh-text overflow-hidden transition-colors duration-500">

  <div class="group absolute left-0 top-0 h-full w-1/12 hover:w-64 z-50">

    <aside class="h-full w-64 bg-isabelline dark:bg-gh-bg border-r border-smoky/10 dark:border-gh-border flex flex-col shadow-2xl -translate-x-full group-hover:translate-x-0 transition-transform duration-300 ease-in-out">

      <div class="p-6 font-bold text-xl tracking-tight whitespace-nowrap">
        Glacier Store
      </div>

      <nav class="flex flex-col gap-2 px-4 mt-4 whitespace-nowrap">

        <button
          (click)="switchTab('summary')"
          [class.bg-sunglow]="activeTab === 'summary'"
          [class.text-smoky]="activeTab === 'summary'"
          [class.dark:bg-gh-surface]="activeTab === 'summary'"
          [class.dark:text-gh-accent]="activeTab === 'summary'"
          class="text-left px-4 py-2 rounded-md hover:bg-sunglow/50 dark:hover:bg-gh-surface transition-colors">
          {{ 'STORE.TAB_SUMMARY' | translate }}
        </button>

        <button
          (click)="switchTab('sales')"
          [class.bg-sunglow]="activeTab === 'sales'"
          [class.text-smoky]="activeTab === 'sales'"
          [class.dark:bg-gh-surface]="activeTab === 'sales'"
          [class.dark:text-gh-accent]="activeTab === 'sales'"
          class="text-left px-4 py-2 rounded-md hover:bg-sunglow/50 dark:hover:bg-gh-surface transition-colors">
          {{ 'STORE.TAB_SALES' | translate }}
        </button>

        <button
          (click)="switchTab('inventory')"
          [class.bg-sunglow]="activeTab === 'inventory'"
          [class.text-smoky]="activeTab === 'inventory'"
          [class.dark:bg-gh-surface]="activeTab === 'inventory'"
          [class.dark:text-gh-accent]="activeTab === 'inventory'"
          class="text-left px-4 py-2 rounded-md hover:bg-sunglow/50 dark:hover:bg-gh-surface transition-colors">
          {{ 'STORE.TAB_INVENTORY' | translate }}
        </button>

        <button
          (click)="switchTab('clients')"
          [class.bg-sunglow]="activeTab === 'clients'"
          [class.text-smoky]="activeTab === 'clients'"
          [class.dark:bg-gh-surface]="activeTab === 'clients'"
          [class.dark:text-gh-accent]="activeTab === 'clients'"
          class="text-left px-4 py-2 rounded-md hover:bg-sunglow/50 dark:hover:bg-gh-surface transition-colors">
          {{ 'STORE.TAB_CLIENTS' | translate }}
        </button>

        <button
          (click)="switchTab('cash-flow')"
          [class.bg-sunglow]="activeTab === 'cash-flow'"
          [class.text-smoky]="activeTab === 'cash-flow'"
          [class.dark:bg-gh-surface]="activeTab === 'cash-flow'"
          [class.dark:text-gh-accent]="activeTab === 'cash-flow'"
          class="text-left px-4 py-2 rounded-md hover:bg-sunglow/50 dark:hover:bg-gh-surface transition-colors">
          {{ 'STORE.TAB_CASH_FLOW' | translate }}
        </button>
      </nav>

      <div class="mt-auto px-4 mb-6 whitespace-nowrap">
        <button
          (click)="triggerProfileSwitch()"
          class="w-full text-left px-4 py-2 rounded-md border border-smoky/20 dark:border-gh-border hover:bg-smoky/5 dark:hover:bg-gh-surface transition-colors text-smoky dark:text-gh-text text-sm">
          &larr; Switch Profile
        </button>
      </div>
    </aside>
  </div>

  <main class="flex-1 flex flex-col w-full h-full">

    <header class="h-16 border-b border-smoky/10 dark:border-gh-border flex items-center justify-between px-8">

      <h2 class="text-lg font-semibold capitalize">{{ activeTab.replace('-', ' ') }}</h2>

      <div class="flex items-center gap-4">
        <button
          (click)="theme.toggleTheme()"
          class="px-3 py-1 rounded-md border border-smoky/20 dark:border-gh-border hover:bg-smoky/5 dark:hover:bg-gh-surface transition-colors text-sm">
          {{ theme.isDarkMode() ? 'Light Mode' : 'Dark Mode' }}
        </button>

        <div class="flex items-center gap-2">
          <input type="date"
                 class="bg-transparent border border-smoky/20 dark:border-gh-border dark:text-gh-text dark:[color-scheme:dark] rounded px-2 py-1 text-sm outline-none focus:border-sunglow dark:focus:border-gh-accent">
          <span class="dark:text-gh-muted">-</span>
          <input type="date"
                 class="bg-transparent border border-smoky/20 dark:border-gh-border dark:text-gh-text dark:[color-scheme:dark] rounded px-2 py-1 text-sm outline-none focus:border-sunglow dark:focus:border-gh-accent">
        </div>
      </div>
    </header>

    <div class="flex-1 p-8 overflow-y-auto">
      @if (activeTab === 'summary') {
        <app-summary></app-summary>
      }
      @if (activeTab === 'sales') {
        <app-sales></app-sales>
      }
      @if (activeTab === 'inventory') {
        <app-inventory></app-inventory>
      }
      @if (activeTab === 'clients') {
        <app-clients></app-clients>
      }
      @if (activeTab === 'cash-flow') {
        <app-cash-flow></app-cash-flow>
      }
    </div>
  </main>
</div>
